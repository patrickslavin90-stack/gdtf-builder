<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDTF Builder — LMNR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0b;
  --surface:  #111113;
  --raised:   #18181c;
  --border:   #222228;
  --border2:  #2e2e38;
  --amber:    #f59e0b;
  --amber-lo: rgba(245,158,11,.08);
  --amber-md: rgba(245,158,11,.18);
  --green:    #34d399;
  --green-lo: rgba(52,211,153,.08);
  --red:      #f87171;
  --red-lo:   rgba(248,113,113,.08);
  --text:     #d1d5db;
  --muted:    #6b7280;
  --bright:   #f9fafb;
  --ui:    'Sora', sans-serif;
  --mono:  'JetBrains Mono', monospace;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui);
  font-size: 14px;
  line-height: 1.6;
}

/* ─── LAYOUT ─── */
.wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ─── HEADER ─── */
header {
  padding: 36px 0 32px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--amber);
  letter-spacing: .05em;
}
.logo-sep { color: var(--border2); font-size: 18px; font-weight: 200; }
.logo-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--bright);
  letter-spacing: -.02em;
}
.logo-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .08em;
  margin-left: auto;
  text-transform: uppercase;
}

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 10px;
}

/* ─── DROP ZONE ─── */
.drop {
  border: 1.5px dashed var(--border2);
  border-radius: 8px;
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  background: var(--raised);
  position: relative;
}
.drop:hover, .drop.over {
  border-color: var(--amber);
  background: var(--amber-lo);
}
.drop-icon {
  font-size: 30px;
  margin-bottom: 10px;
  opacity: .5;
  display: block;
}
.drop-label {
  font-size: 14px;
  color: var(--muted);
  font-weight: 400;
}
.drop-types {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border2);
  margin-top: 6px;
  letter-spacing: .05em;
  text-transform: uppercase;
}
#file-input { display: none; }
.file-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green-lo);
  border: 1px solid rgba(52,211,153,.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  margin-top: 12px;
}
.file-pill::before { content: '✓'; font-size: 10px; }

/* ─── FIELDS ─── */
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
}
input[type=text], select, textarea {
  background: var(--raised);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--bright);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--amber);
}
select option { background: var(--raised); }
textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

/* ─── ADVANCED TOGGLE ─── */
.adv-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 12px 0 4px;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--mono);
  letter-spacing: .04em;
  user-select: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: color .15s;
}
.adv-toggle:hover { color: var(--text); }
.adv-toggle .adv-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.adv-arrow { font-size: 9px; transition: transform .2s; }
.adv-arrow.open { transform: rotate(180deg); }
.adv-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height .25s ease;
}
.adv-body.open { max-height: 600px; }

/* ─── GENERATE BUTTON ─── */
.btn-gen {
  width: 100%;
  padding: 13px;
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--ui);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .02em;
  cursor: pointer;
  transition: opacity .15s, transform .1s, box-shadow .15s;
  margin-top: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-gen:hover:not(:disabled) {
  opacity: .9;
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(245,158,11,.25);
}
.btn-gen:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-gen .spin {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid rgba(0,0,0,.25);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin .5s linear infinite;
}
.btn-gen.loading .btn-text { display: none; }
.btn-gen.loading .spin { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── STATUS ─── */
.status {
  display: none;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 11px;
}
.status.show { display: flex; }
.status.ok   { background: var(--green-lo); border: 1px solid rgba(52,211,153,.2); color: var(--green); }
.status.err  { background: var(--red-lo);   border: 1px solid rgba(248,113,113,.2); color: var(--red); }
.status.busy { background: var(--amber-lo); border: 1px solid rgba(245,158,11,.2);  color: var(--amber); }
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.status.busy .status-dot { animation: blink .8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ─── OUTPUT CARD ─── */
#output-card { display: none; }
#output-card.show { display: block; }

.output-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.output-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--bright);
}
.output-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

.val-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  margin-bottom: 14px;
}
.val-item {
  font-family: var(--mono);
  font-size: 9px;
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--muted);
}
.val-item.ok  { color: var(--green); }
.val-item.err { color: var(--red); }

.xml-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  font-family: var(--mono);
  font-size: 9px;
  line-height: 1.7;
  max-height: 200px;
  overflow-y: auto;
  white-space: pre;
  color: #6b7280;
  margin-bottom: 12px;
}
.xml-box::-webkit-scrollbar { width: 3px; }
.xml-box::-webkit-scrollbar-thumb { background: var(--border2); }
.xt { color: #60a5fa; }
.xa { color: #f59e0b; }
.xv { color: #34d399; }

.btn-dl {
  width: 100%;
  padding: 11px;
  background: transparent;
  border: 1px solid rgba(52,211,153,.35);
  border-radius: 7px;
  color: var(--green);
  font-family: var(--ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s, box-shadow .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-dl:hover:not(:disabled) {
  background: var(--green-lo);
  border-color: var(--green);
  box-shadow: 0 0 16px rgba(52,211,153,.15);
}
.btn-dl:disabled { opacity: .3; cursor: not-allowed; }

.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-copy {
  flex: 0 0 auto;
  padding: 10px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  letter-spacing: .04em;
}
.btn-copy:hover { border-color: var(--text); color: var(--text); }

/* ─── FOOTER ─── */
footer {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--amber); }

/* ─── RESPONSIVE ─── */
@media (max-width: 480px) {
  .row { grid-template-columns: 1fr; }
  .val-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- ─ HEADER ─ -->
  <header>
    <span class="logo">LMNR</span>
    <span class="logo-sep">/</span>
    <span class="logo-name">GDTF Builder</span>
    <span class="logo-sub">v2</span>
  </header>

  <!-- ─ MAIN CARD ─ -->
  <div class="card">

    <!-- Drop zone -->
    <div class="drop" id="drop" onclick="document.getElementById('file-input').click()">
      <span class="drop-icon">⬆</span>
      <div class="drop-label">Drop a file or click to browse</div>
      <div class="drop-types">GDTF · XML · MA3 patch · PDF · Image · CSV · TXT</div>
    </div>
    <input type="file" id="file-input" accept=".gdtf,.xml,.pdf,.png,.jpg,.jpeg,.csv,.txt">
    <div id="file-display"></div>

    <!-- Essential fields -->
    <div class="row">
      <div class="field">
        <label>Fixture Name</label>
        <input type="text" id="fixture-name" placeholder="e.g. GTD-F3 II BSW">
      </div>
      <div class="field">
        <label>Manufacturer</label>
        <input type="text" id="manufacturer" placeholder="e.g. GTD lighting">
      </div>
    </div>

    <!-- Advanced toggle -->
    <button class="adv-toggle" onclick="toggleAdv(this)">
      <span>Advanced</span>
      <span class="adv-line"></span>
      <span class="adv-arrow" id="adv-arrow">▼</span>
    </button>
    <div class="adv-body" id="adv-body">
      <div style="padding-top:10px;display:flex;flex-direction:column;gap:10px">

        <div class="row">
          <div class="field">
            <label>Short Name</label>
            <input type="text" id="short-name" placeholder="e.g. F3 II BSW">
          </div>
          <div class="field">
            <label>DMX Mode Name</label>
            <input type="text" id="dmx-mode" placeholder="e.g. Standard 19CH">
          </div>
        </div>

        <div class="field">
          <label>Manual Channel List</label>
          <textarea id="manual-channels" placeholder="CH1 – Shutter (0-31 closed, 32-63 open, 64-127 strobe)&#10;CH2,3 – Dimmer 16-bit&#10;CH4 – Color wheel (0=open, 18=Red, 28=Blue...)&#10;..."></textarea>
        </div>

        <div class="field">
          <label>Extra Notes</label>
          <textarea id="extra-notes" style="min-height:60px" placeholder="Corrections, context, or anything else for the AI…"></textarea>
        </div>

        <div class="row">
          <div class="field">
            <label>Fixture Type</label>
            <select id="fixture-type">
              <option value="auto">Auto-detect</option>
              <option value="moving_bsw">Moving Head BSW</option>
              <option value="moving_beam">Moving Head Beam</option>
              <option value="moving_spot">Moving Head Spot</option>
              <option value="moving_wash">Moving Head Wash</option>
              <option value="led_par">LED PAR / Wash</option>
              <option value="led_bar">LED Bar / Batten</option>
              <option value="strobe">Strobe</option>
              <option value="generic">Generic</option>
            </select>
          </div>
          <div class="field">
            <label>3D Model</label>
            <select id="model-type">
              <option value="none">None (wireframe)</option>
              <option value="spot" selected>Spot / Moving Head</option>
              <option value="wash">Wash</option>
              <option value="strobe">Strobe / Blinder</option>
              <option value="bar">LED Bar</option>
            </select>
          </div>
        </div>

      </div>
    </div>

    <!-- Generate -->
    <button class="btn-gen" id="gen-btn" onclick="generate()">
      <span class="btn-text">Generate GDTF</span>
      <div class="spin"></div>
    </button>

    <!-- Status -->
    <div class="status" id="status">
      <div class="status-dot"></div>
      <span id="status-msg"></span>
    </div>

  </div><!-- .card -->

  <!-- ─ OUTPUT CARD ─ -->
  <div class="card" id="output-card">
    <div class="output-header">
      <span class="output-title" id="output-title">Ready</span>
      <span class="output-meta" id="output-meta"></span>
    </div>
    <div class="val-grid" id="val-grid"></div>
    <div class="xml-box" id="xml-box"></div>
    <button class="btn-dl" id="dl-btn" onclick="downloadGDTF()" disabled>
      ↓ Download .gdtf
    </button>
    <div class="btn-row">
      <button class="btn-copy" onclick="copyXML()">Copy XML</button>
    </div>
  </div>

  <!-- ─ FOOTER ─ -->
  <footer>
    <span>LMNR GDTF Builder · <a href="https://gdtf-share.com" target="_blank">GDTF Share ↗</a></span>
    <span>Powered by Gemini 1.5 Flash</span>
  </footer>

</div><!-- .wrap -->

<script>
// ── State
let fileContent = null, fileType = null, fileName = null;
let generatedXML = null, generatedName = 'fixture';

// ── Init
document.addEventListener('DOMContentLoaded', () => {
  setupDrop();
});

// ── Advanced toggle
function toggleAdv(btn) {
  const body = document.getElementById('adv-body');
  const arrow = document.getElementById('adv-arrow');
  const open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  arrow.classList.toggle('open', !open);
}

// ── File drop
function setupDrop() {
  const dz = document.getElementById('drop');
  const fi = document.getElementById('file-input');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fi.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
}

function handleFile(file) {
  fileName = file.name;
  const ext = file.name.split('.').pop().toLowerCase();

  // Auto-fill name if empty
  const nm = file.name.replace(/\.[^.]+$/, '').replace(/[_\-]+/g, ' ').trim();
  if (!document.getElementById('fixture-name').value) document.getElementById('fixture-name').value = nm;

  document.getElementById('file-display').innerHTML =
    `<div class="file-pill">${file.name} — ${(file.size/1024).toFixed(1)} KB</div>`;

  if (['png','jpg','jpeg'].includes(ext)) {
    fileType = 'image';
    const r = new FileReader();
    r.onload = e => fileContent = e.target.result.split(',')[1];
    r.readAsDataURL(file);
  } else if (ext === 'pdf') {
    fileType = 'pdf';
    const r = new FileReader();
    r.onload = e => fileContent = e.target.result.split(',')[1];
    r.readAsDataURL(file);
  } else if (ext === 'xmlp') {
    // MA3 patch export — gzip compressed XML
    fileType = 'ma3xml';
    const r = new FileReader();
    r.onload = async e => {
      try {
        const ds = new DecompressionStream('gzip');
        const blob = new Blob([e.target.result]);
        const decompressed = blob.stream().pipeThrough(ds);
        const text = await new Response(decompressed).text();
        // Strip binary header if present (MA3 adds "MA DATA" prefix)
        const xmlStart = text.indexOf('<?xml');
        fileContent = xmlStart !== -1 ? text.slice(xmlStart) : text;
      } catch(err) { setStatus('err', 'Could not decompress .xmlp: ' + err.message); }
    };
    r.readAsArrayBuffer(file);
  } else if (ext === 'gdtf') {
    fileType = 'gdtf';
    const r = new FileReader();
    r.onload = async e => {
      try {
        const zip = await JSZip.loadAsync(e.target.result);
        const df = zip.file('description.xml');
        if (df) {
          fileContent = await df.async('string');
        }
      } catch(err) { setStatus('err', 'Could not read GDTF: ' + err.message); }
    };
    r.readAsArrayBuffer(file);
  } else {
    fileType = 'text';
    const r = new FileReader();
    r.onload = e => fileContent = e.target.result;
    r.readAsText(file);
  }
}

// ── Generate a valid uppercase GUID
function makeGUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16).toUpperCase();
  });
}

// ── Deterministic fixes for existing GDTF
function applyMA3Fixes(xml) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'application/xml');
    const parseErr = doc.querySelector('parsererror');
    if (parseErr) {
      // Try stripping the XML declaration and re-parsing
      const stripped = xml.replace(/<\?xml[^?]*\?>\s*/i, '');
      const doc2 = parser.parseFromString(stripped, 'application/xml');
      if (doc2.querySelector('parsererror')) return null;
    }
    const root = doc.documentElement;
    const ft = root.querySelector('FixtureType');
    if (!ft) return null;

    root.setAttribute('DataVersion', '1.2');
    if (ft.getAttribute('CanHaveChildren') !== 'Yes') ft.setAttribute('CanHaveChildren', 'Yes');
    if (!ft.getAttribute('ThumbnailOffsetX')) ft.setAttribute('ThumbnailOffsetX', '0');
    if (!ft.getAttribute('ThumbnailOffsetY')) ft.setAttribute('ThumbnailOffsetY', '0');
    if (ft.getAttribute('RefFT') !== null) ft.removeAttribute('RefFT');

    // Ensure valid uppercase GUID
    const guid = ft.getAttribute('FixtureTypeID') || '';
    const validGuid = /^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$/.test(guid);
    ft.setAttribute('FixtureTypeID', validGuid ? guid.toUpperCase() : makeGUID());

    ft.querySelectorAll('ChannelFunction').forEach(cf => {
      if (!cf.hasAttribute('CustomName')) cf.setAttribute('CustomName', '');
      if (!cf.hasAttribute('Max')) cf.setAttribute('Max', '1.000000');
      if (!cf.hasAttribute('Min')) cf.setAttribute('Min', '0.000000');
      if (!cf.hasAttribute('RealAcceleration')) cf.setAttribute('RealAcceleration', '0.000000');
      if (!cf.hasAttribute('Default')) cf.setAttribute('Default', cf.getAttribute('DMXFrom') || '0/1');
    });

    ft.querySelectorAll('DMXMode').forEach(m => { if (!m.hasAttribute('Description')) m.setAttribute('Description', ''); });

    ft.querySelectorAll('DMXChannel').forEach(dc => {
      if (!dc.getAttribute('InitialFunction')) {
        const geo = dc.getAttribute('Geometry') || 'Base';
        const lc = dc.querySelector('LogicalChannel');
        if (lc) {
          const attr = lc.getAttribute('Attribute') || '';
          const cf = lc.querySelector('ChannelFunction');
          const cfName = cf ? (cf.getAttribute('Name') || attr) : attr;
          dc.setAttribute('InitialFunction', `${geo}_${attr}.${attr}.${cfName}`);
        }
      }
    });

    ft.querySelectorAll('Attribute').forEach(attr => {
      const name = attr.getAttribute('Name') || '';
      if (['ColorAdd_R','ColorAdd_G','ColorAdd_B'].includes(name)) {
        attr.setAttribute('Feature', 'Color.RGB');
        attr.setAttribute('PhysicalUnit', 'ColorComponent');
      }
    });

    const colorFG = Array.from(ft.querySelectorAll('FeatureGroup')).find(fg => fg.getAttribute('Name') === 'Color');
    if (colorFG && !Array.from(colorFG.querySelectorAll('Feature')).some(f => f.getAttribute('Name') === 'RGB')) {
      const f = doc.createElement('Feature'); f.setAttribute('Name', 'RGB'); colorFG.insertBefore(f, colorFG.firstChild);
    }

    if (!ft.querySelector('Revisions')) {
      const rev = doc.createElement('Revisions');
      const r = doc.createElement('Revision');
      r.setAttribute('Date', new Date().toISOString().split('.')[0]);
      r.setAttribute('ModifiedBy', 'LMNR GDTF Builder');
      r.setAttribute('Text', 'Fixed by LMNR Builder');
      r.setAttribute('UserID', '0');
      rev.appendChild(r); ft.appendChild(rev);
    }
    if (!ft.querySelector('FTPresets')) ft.appendChild(doc.createElement('FTPresets'));
    if (!ft.querySelector('Protocols')) ft.appendChild(doc.createElement('Protocols'));

    const pd = ft.querySelector('PhysicalDescriptions');
    if (pd) {
      ['AdditionalColorSpaces','Gamuts','Connectors'].forEach(t => { if (!pd.querySelector(t)) pd.appendChild(doc.createElement(t)); });
      if (!pd.querySelector('Properties')) {
        const p = doc.createElement('Properties');
        const ot = doc.createElement('OperatingTemperature'); ot.setAttribute('High','40.000000'); ot.setAttribute('Low','0.000000');
        const w = doc.createElement('Weight'); w.setAttribute('Value','0.000000');
        const lh = doc.createElement('LegHeight'); lh.setAttribute('Value','0.000000');
        p.appendChild(ot); p.appendChild(w); p.appendChild(lh); pd.appendChild(p);
      }
      const cs = pd.querySelector('ColorSpace');
      if (cs && !cs.hasAttribute('Name')) cs.setAttribute('Name', '');
    }

    ft.querySelectorAll('Model').forEach(m => {
      ['SVGOffsetX','SVGOffsetY','SVGFrontOffsetX','SVGFrontOffsetY','SVGSideOffsetX','SVGSideOffsetY'].forEach(a => {
        if (!m.hasAttribute(a)) m.setAttribute(a, '0.000000');
      });
    });

    ft.querySelectorAll('Beam').forEach(b => {
      if (!b.hasAttribute('RectangleRatio')) b.setAttribute('RectangleRatio', '1.777700');
      if (!b.hasAttribute('ThrowRatio')) b.setAttribute('ThrowRatio', '1.000000');
    });

    ft.querySelectorAll('ChannelSet').forEach(cs => {
      const n = cs.getAttribute('Name') || '';
      if (n.includes('.')) cs.setAttribute('Name', n.replace(/\./g, '-'));
    });

    const s = new XMLSerializer();
    return '<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n' + s.serializeToString(doc.documentElement);
  } catch { return null; }
}

// ── Validate
function validate(xml) {
  const results = [];
  const add = (ok, msg) => results.push({ ok, msg });
  try {
    const doc = new DOMParser().parseFromString(xml, 'application/xml');
    if (doc.querySelector('parsererror')) { add(false, 'XML parse error'); return results; }
    const root = doc.documentElement;
    const ft = root.querySelector('FixtureType');
    if (!ft) { add(false, 'No FixtureType'); return results; }
    add(root.getAttribute('DataVersion') === '1.2', 'DataVersion 1.2');
    add(ft.getAttribute('CanHaveChildren') === 'Yes', 'CanHaveChildren');
    add(!ft.getAttribute('RefFT'), 'RefFT absent');
    add(/^[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}$/.test(ft.getAttribute('FixtureTypeID')||''), 'GUID uppercase');
    const chs = ft.querySelectorAll('DMXChannel');
    add([...chs].every(c => c.getAttribute('InitialFunction')), `InitialFunction (${chs.length}ch)`);
    const cfs = ft.querySelectorAll('ChannelFunction');
    add([...cfs].every(c => c.hasAttribute('Default')), `CF Defaults (${cfs.length})`);
    add([...cfs].every(c => c.hasAttribute('CustomName')), 'CustomName on CFs');
    add(!!ft.querySelector('Revisions'), 'Revisions');
    add(!!ft.querySelector('AdditionalColorSpaces'), 'PhysDesc complete');
    const cs = ft.querySelector('ColorSpace');
    add(!!cs && cs.hasAttribute('Name'), 'ColorSpace Name');
    add(![...ft.querySelectorAll('ChannelSet')].some(c => (c.getAttribute('Name')||'').includes('.')), 'No periods in names');
    const cr = ft.querySelector('Attribute[Name="ColorAdd_R"]');
    if (cr) add(cr.getAttribute('Feature') === 'Color.RGB', 'Color.RGB feature');
  } catch(e) { add(false, e.message); }
  return results;
}

// ── Generate
async function generate() {
  const fixtureName = document.getElementById('fixture-name').value.trim();
  const manufacturer = document.getElementById('manufacturer').value.trim();
  const shortName = document.getElementById('short-name').value.trim();
  const dmxMode = document.getElementById('dmx-mode').value.trim();
  const channels = document.getElementById('manual-channels').value.trim();
  const notes = document.getElementById('extra-notes').value.trim();
  const fixtureType = document.getElementById('fixture-type').value;

  if (!fileContent && !channels && !fixtureName) {
    setStatus('err', 'Upload a file or enter a fixture name / channel list');
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.classList.add('loading'); btn.disabled = true;
  generatedXML = null;

  try {
    // Try deterministic fix first for existing GDTF
    if (fileType === 'gdtf' && fileContent) {
      setStatus('busy', 'Applying MA3 fixes to existing profile…');
      const fixed = applyMA3Fixes(fileContent);
      if (fixed) {
        generatedXML = fixed;
        generatedName = fixtureName || fileName?.replace(/\.[^.]+$/,'') || 'fixture';
        showOutput(fixed, manufacturer);
        return;
      }
    }

    // AI generation via backend proxy
    setStatus('busy', 'Generating profile…');
    const payload = { manufacturer, fixtureName, shortName, dmxMode, fixtureType, channels, notes };
    if (fileType === 'ma3xml' && fileContent) {
      payload.ma3Xml = fileContent.slice(0, 30000);
      // Auto-extract fixture info from MA3 XML if not already filled
      const ma3Name = fileContent.match(/FixtureType\s+name="([^"]+)"/);
      const ma3Mode = fileContent.match(/FixtureType[^>]+mode="([^"]+)"/);
      const ma3Mfr = fileContent.match(/<manufacturer>([^<]+)<\/manufacturer>/);
      if (ma3Name && !payload.fixtureName) payload.fixtureName = ma3Name[1];
      if (ma3Mode && !payload.dmxMode) payload.dmxMode = ma3Mode[1];
      if (ma3Mfr && !payload.manufacturer) payload.manufacturer = ma3Mfr[1];
    }
    if (fileType === 'text' && fileContent) payload.existingXml = fileContent.includes('<GDTF') ? fileContent : null;
    if (fileType === 'text' && fileContent && !payload.existingXml) payload.channels = (channels ? channels + '\n\n' : '') + 'FILE CONTENT:\n' + fileContent.slice(0, 8000);

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    let xml = data.xml;
    // Clean up any markdown/preamble Gemini sometimes adds
    xml = xml.replace(/```xml\n?/gi, '').replace(/```\n?/g, '').trim();
    // Extract just the GDTF block
    const xmlStart = xml.indexOf('<?xml');
    const xmlEnd   = xml.lastIndexOf('</GDTF>');
    if (xmlStart !== -1 && xmlEnd !== -1) xml = xml.slice(xmlStart, xmlEnd + 7);
    else {
      const gdtfStart = xml.indexOf('<GDTF');
      if (gdtfStart !== -1 && xmlEnd !== -1) xml = xml.slice(gdtfStart, xmlEnd + 7);
    }
    if (!xml.includes('<GDTF')) throw new Error('Gemini did not return valid GDTF XML — try again');

    // Run deterministic fixes on AI output, but don't crash if XML is slightly malformed
    let fixed = null;
    try { fixed = applyMA3Fixes(xml); } catch(e) { /* use raw xml */ }
    generatedXML = fixed || xml;
    generatedName = fixtureName || 'fixture';
    showOutput(generatedXML, manufacturer);

  } catch(err) {
    setStatus('err', err.message);
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status show ' + type;
  document.getElementById('status-msg').textContent = msg;
}

// ── Show output
function showOutput(xml, manufacturer) {
  const chCount = (xml.match(/<DMXChannel/g)||[]).length;
  const cfCount = (xml.match(/<ChannelFunction/g)||[]).length;
  const modeM = xml.match(/DMXMode[^>]+Name="([^"]+)"/);

  document.getElementById('output-title').textContent =
    (document.getElementById('fixture-name').value || 'Profile') + ' — GDTF Ready';
  document.getElementById('output-meta').textContent =
    `${chCount}ch · ${cfCount} functions${modeM ? ' · ' + modeM[1] : ''}`;

  const valResults = validate(xml);
  const errCount = valResults.filter(r => !r.ok).length;

  document.getElementById('val-grid').innerHTML = valResults.map(r =>
    `<div class="val-item ${r.ok ? 'ok' : 'err'}">${r.ok ? '✓' : '✗'} ${r.msg}</div>`
  ).join('');

  document.getElementById('xml-box').innerHTML = syntaxHL(xml.slice(0, 5000) + (xml.length > 5000 ? '\n…' : ''));

  document.getElementById('output-card').classList.add('show');
  document.getElementById('dl-btn').disabled = false;
  document.getElementById('dl-btn').textContent = `↓ Download ${(generatedName||'fixture').replace(/\s+/g,'_')}.gdtf`;

  setStatus(errCount === 0 ? 'ok' : 'busy',
    errCount === 0
      ? `${valResults.length}/${valResults.length} checks passed — ready to download`
      : `${valResults.filter(r=>r.ok).length}/${valResults.length} checks passed`
  );
}

function syntaxHL(xml) {
  return xml
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/&lt;\/?([A-Za-z][A-Za-z0-9]*)/g, (m,t) => m.replace(t, `<span class="xt">${t}</span>`))
    .replace(/\b([A-Za-z][A-Za-z0-9]*)=/g, `<span class="xa">$1</span>=`)
    .replace(/="([^"]*)"/g, `="<span class="xv">$1</span>"`);
}

// ── 3D Model file mapping
const MODEL_FILES = {
  spot:   ['base.3ds', 'yoke.3ds', 'head.3ds'],
  wash:   ['base.3ds', 'yoke.3ds', 'head.3ds'],
  strobe: ['base.3ds', 'yoke.3ds', 'head.3ds'],
  bar:    ['yoke.3ds', 'head.3ds'],
};

// Update XML Model elements to reference .3ds files
function setModelFiles(xml, modelType) {
  if (!modelType || modelType === 'none') return xml;
  // Set File attribute and PrimitiveType="Undefined" on all Model elements
  return xml.replace(/<Model\s([^>]*?)(\s*\/?>)/g, (match, attrs, close) => {
    const nameMatch = attrs.match(/Name="([^"]+)"/);
    if (!nameMatch) return match;
    const name = nameMatch[1].toLowerCase();
    let file = '';
    if (name.includes('base') || name.includes('body')) file = 'base';
    else if (name.includes('yoke') || name.includes('arm')) file = 'yoke';
    else file = 'head';
    // For bar type without base model, map base to yoke
    if (modelType === 'bar' && file === 'base') file = 'yoke';
    // Remove existing File/PrimitiveType/Primitive attrs and add new ones
    let newAttrs = attrs
      .replace(/\s*File="[^"]*"/g, '')
      .replace(/\s*PrimitiveType="[^"]*"/g, '')
      .replace(/\s*Primitive="[^"]*"/g, '');
    newAttrs += ` File="${file}" PrimitiveType="Undefined"`;
    return `<Model ${newAttrs}${close}`;
  });
}

// ── Download — always as description.xml inside ZIP
async function downloadGDTF() {
  if (!generatedXML) return;
  const mfr = (document.getElementById('manufacturer').value.trim() || 'Unknown').replace(/[^a-zA-Z0-9 _-]/g,'');
  const name = (generatedName || 'fixture').replace(/[^a-zA-Z0-9 _-]/g,'');
  const filename = `${mfr}_${name}.gdtf`.replace(/\s+/g,'_');
  const modelType = document.getElementById('model-type').value;

  // Update XML with model file references
  let xml = modelType !== 'none' ? setModelFiles(generatedXML, modelType) : generatedXML;

  const zip = new JSZip();
  zip.file('description.xml', xml);

  // Include 3D model files if a type is selected
  if (modelType !== 'none' && MODEL_FILES[modelType]) {
    for (const file of MODEL_FILES[modelType]) {
      try {
        const res = await fetch(`/models/${modelType}/${file}`);
        if (res.ok) {
          const buf = await res.arrayBuffer();
          zip.file(`models/3ds/${file}`, buf);
        }
      } catch(e) { /* skip missing model files */ }
    }
  }

  const blob = await zip.generateAsync({ type:'blob', compression:'STORE' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

async function copyXML() {
  if (!generatedXML) return;
  await navigator.clipboard.writeText(generatedXML);
  const btn = document.querySelector('.btn-copy');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy XML', 1500);
}
